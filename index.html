<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>かんたんゲーム</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f4f7fb;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }
    .panel {
      width: 90%;
      max-width: 700px;
      background: white;
      border-radius: 16px;
      padding: 24px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.12);
      text-align: center;
    }
    h1 {
      margin-top: 0;
    }
    .stats {
      display: flex;
      justify-content: center;
      gap: 24px;
      font-size: 18px;
      margin: 16px 0;
      flex-wrap: wrap;
    }
    #gameArea {
      position: relative;
      width: 100%;
      height: 400px;
      background: linear-gradient(180deg, #dff3ff, #eef8e8);
      border: 2px solid #d0d7de;
      border-radius: 12px;
      overflow: hidden;
      margin-top: 16px;
    }
    #target {
      position: absolute;
      width: 60px;
      height: 60px;
      border-radius: 50%;
      background: #ff4d4f;
      cursor: pointer;
      box-shadow: 0 6px 16px rgba(0,0,0,0.2);
      transition: transform 0.08s;
    }
    #target:active {
      transform: scale(0.92);
    }
    button {
      border: none;
      background: #2563eb;
      color: white;
      padding: 12px 20px;
      border-radius: 10px;
      cursor: pointer;
      font-size: 16px;
    }
    button:hover {
      background: #1d4ed8;
    }
    .message {
      margin-top: 12px;
      font-size: 16px;
      min-height: 24px;
    }
  </style>
</head>
<body>
  <div class="panel">
    <h1>赤い丸をクリック！</h1>
    <p>20秒のあいだにできるだけ多くクリックしてください。</p>
    <button id="startBtn">ゲーム開始</button>

    <div class="stats">
      <div>スコア: <strong id="score">0</strong></div>
      <div>残り時間: <strong id="time">20</strong> 秒</div>
    </div>

    <div id="gameArea">
      <div id="target" hidden></div>
    </div>

    <div class="message" id="message">スタートボタンを押してください。</div>
  </div>

  <script>
    const startBtn = document.getElementById('startBtn');
    const target = document.getElementById('target');
    const gameArea = document.getElementById('gameArea');
    const scoreEl = document.getElementById('score');
    const timeEl = document.getElementById('time');
    const messageEl = document.getElementById('message');

    let score = 0;
    let timeLeft = 20;
    let timer = null;
    let playing = false;

    function moveTarget() {
      const areaRect = gameArea.getBoundingClientRect();
      const maxX = areaRect.width - 60;
      const maxY = areaRect.height - 60;
      const x = Math.random() * maxX;
      const y = Math.random() * maxY;
      target.style.left = `${x}px`;
      target.style.top = `${y}px`;
    }

    function endGame() {
      playing = false;
      clearInterval(timer);
      target.hidden = true;
      messageEl.textContent = `終了！あなたのスコアは ${score} 点です。もう一度遊べます。`;
      startBtn.disabled = false;
      startBtn.textContent = 'もう一度遊ぶ';
    }

    function startGame() {
      score = 0;
      timeLeft = 20;
      playing = true;
      scoreEl.textContent = score;
      timeEl.textContent = timeLeft;
      messageEl.textContent = '赤い丸をどんどんクリック！';
      startBtn.disabled = true;
      target.hidden = false;
      moveTarget();

      timer = setInterval(() => {
        timeLeft--;
        timeEl.textContent = timeLeft;
        if (timeLeft <= 0) {
          endGame();
        }
      }, 1000);
    }

    target.addEventListener('click', () => {
      if (!playing) return;
      score++;
      scoreEl.textContent = score;
      moveTarget();
    });

    startBtn.addEventListener('click', startGame);
  </script>
</body>
</html>
